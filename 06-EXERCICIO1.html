<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    .cor-vermelha { color: red; }
    .cor-azul     { color: blue; }
  </style>
</head>
<body>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <div id="root"></div>

  <script type="text/babel">

    // Função componente que recebe as props personalizadas
    function CartaoPessoa(props) {

      // Cálculo da idade ao final de 2026
      const idade = 2026 - props.ano;

      return (
        <>
          {/* Primeiro parágrafo - nome completo */}
          <p className="cor-vermelha">
            {props.nome} {props.sobrenome}
          </p>

          {/* Segundo parágrafo - data de nascimento */}
          <p className="cor-azul">
            {props.dia}/{props.mes}/{props.ano}
          </p>

          {/* Div com a idade */}
          <div>
            Idade em 2026: {idade}
          </div>
        </>
      );
    }

    // Renderizando o componente com dados de exemplo
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(
      <CartaoPessoa
        nome="Maria"
        sobrenome="Oliveira"
        dia="14"
        mes="03"
        ano={1995}
      />
    );

  </script>

</body>
</html>
